{% extends "dashboard/base.html" %}
{% block content %}
<div class="page-head"><h1>Follow-up Sequence</h1></div>
<section class="panel">
  <table class="table table-dark"><thead><tr><th>Step</th><th>Delay Days</th><th>Template</th><th>Enabled</th><th></th></tr></thead><tbody>
  {% for step in steps %}
  <tr><form method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token }}"><input type="hidden" name="id" value="{{ step.id }}"><td><input class="form-control" name="step_number" value="{{ step.step_number }}"></td><td><input class="form-control" name="delay_days" value="{{ step.delay_days }}"></td><td><select class="form-select" name="template_name">{% for t in templates %}<option value="{{ t.name }}" {% if step.template_name == t.name %}selected{% endif %}>{{ t.name }}</option>{% endfor %}</select></td><td><input class="form-check-input" type="checkbox" name="enabled" {% if step.enabled %}checked{% endif %}></td><td><button class="btn btn-primary">Save</button></td></form></tr>
  {% endfor %}
  <tr><form method="post"><input type="hidden" name="csrf_token" value="{{ csrf_token }}"><td><input class="form-control" name="step_number" required></td><td><input class="form-control" name="delay_days" required></td><td><select class="form-select" name="template_name">{% for t in templates %}<option value="{{ t.name }}">{{ t.name }}</option>{% endfor %}</select></td><td><input class="form-check-input" type="checkbox" name="enabled" checked></td><td><button class="btn btn-success">Add</button></td></form></tr>
  </tbody></table>
</section>
{% endblock %}
