{% extends "dashboard/base.html" %}
{% block content %}
<div class="page-head"><h1>Statistics</h1></div>
<div class="metric-grid"><div class="metric"><span>Total</span><strong>{{ total }}</strong></div><div class="metric"><span>Replies</span><strong>{{ replies }}</strong></div><div class="metric"><span>Sent</span><strong>{{ sent }}</strong></div><div class="metric"><span>Reply Rate</span><strong>{{ rate }}%</strong></div></div>
<section class="panel"><table class="table table-dark"><thead><tr><th>Status</th><th>Count</th></tr></thead><tbody>{% for key,value in by_status.items() %}<tr><td>{{ key }}</td><td>{{ value }}</td></tr>{% endfor %}</tbody></table></section>
{% endblock %}
