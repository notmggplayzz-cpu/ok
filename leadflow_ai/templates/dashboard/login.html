<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LeadFlow AI Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet">
</head>
<body class="login-body">
  <form class="login-panel" method="post">
    <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
    <h1>LeadFlow AI</h1>
    <p class="text-secondary">Secure dashboard access</p>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    <label class="form-label">Username</label>
    <input class="form-control mb-3" name="username" autocomplete="username" required>
    <label class="form-label">Password</label>
    <input class="form-control mb-4" name="password" type="password" autocomplete="current-password" required>
    <button class="btn btn-primary w-100" type="submit">Sign in</button>
  </form>
</body>
</html>
