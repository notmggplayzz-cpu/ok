{% extends "dashboard/base.html" %}
{% block content %}
<div class="page-head"><h1>Logs</h1></div>
<section class="panel"><table class="table table-dark table-hover"><thead><tr><th>Time</th><th>Level</th><th>Category</th><th>Message</th></tr></thead><tbody>{% for log in logs %}<tr><td>{{ log.created_at }}</td><td>{{ log.level }}</td><td>{{ log.category }}</td><td>{{ log.message }}</td></tr>{% endfor %}</tbody></table></section>
{% endblock %}
