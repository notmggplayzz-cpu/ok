<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LeadFlow AI</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{{ url_for('static', filename='css/app.css') }}" rel="stylesheet">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">LeadFlow AI</div>
      <nav class="nav flex-column gap-1">
        <a class="nav-link" href="{{ url_for('dashboard.index') }}">Dashboard</a>
        <a class="nav-link" href="{{ url_for('dashboard.leads') }}">Leads</a>
        <a class="nav-link" href="{{ url_for('dashboard.templates') }}">Templates</a>
        <a class="nav-link" href="{{ url_for('dashboard.sequence') }}">Follow-up Sequence</a>
        <a class="nav-link" href="{{ url_for('dashboard.settings') }}">Settings</a>
        <a class="nav-link" href="{{ url_for('dashboard.logs') }}">Logs</a>
        <a class="nav-link" href="{{ url_for('dashboard.statistics') }}">Statistics</a>
        <a class="nav-link" href="{{ url_for('dashboard.exports') }}">Exports</a>
        <a class="nav-link" href="{{ url_for('dashboard.health') }}">Health</a>
      </nav>
      <form method="post" action="{{ url_for('dashboard.logout') }}" class="mt-auto">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <button class="btn btn-outline-light w-100" type="submit">Sign out</button>
      </form>
    </aside>
    <main class="content">
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
          </div>
        {% endfor %}
      {% endwith %}
      {% block content %}{% endblock %}
    </main>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
